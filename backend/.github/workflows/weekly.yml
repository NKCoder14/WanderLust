name: WanderLust Weekly

on:
  schedule:
    - cron: "30 2 * * 6"

  workflow_dispatch:

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger pipeline
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ secrets.API_URL }}/api/run" \
            -H "X-API-Key: ${{ secrets.API_SECRET_KEY }}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "429" ]; then
            echo "Rate limited — a run was already triggered recently. Exiting gracefully."
            exit 0
          elif [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to trigger pipeline (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Pipeline triggered successfully"

      - name: Wait for completion
        run: |
          echo "Polling GET /api/run/status every 10s (timeout: 10 minutes)..."
          for i in $(seq 1 60); do
            sleep 10
            RESPONSE=$(curl -sf "${{ secrets.API_URL }}/api/run/status" || echo '{"status":"unknown"}')
            STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.loads(sys.stdin.read()).get('status','unknown'))")
            echo "Attempt $i/60: status=$STATUS"
            if [ "$STATUS" = "complete" ]; then
              echo "✅ Pipeline completed successfully"
              exit 0
            elif [ "$STATUS" = "failed" ]; then
              ERROR=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.loads(sys.stdin.read()).get('error_message','unknown error'))")
              echo "❌ Pipeline failed: $ERROR"
              exit 1
            fi
          done
          echo "❌ Timed out waiting for pipeline completion (10 minutes)"
          exit 1